<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEDO | Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #ff9100;
            --glow-orange: rgba(255, 145, 0, 0.15);
            --bg-dark: #050505;
            --card-bg: rgba(17, 17, 17, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Background Effects */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 145, 0, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }

        /* Navigation */
        nav {
            padding: 15px 5%;
            background: rgba(0,0,0,0.85);
            border-bottom: 1px solid rgba(255, 145, 0, 0.2);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 15px;
        }

        .logo-container { height: 40px; display: flex; align-items: center; }
        .logo-container img { height: 100%; width: auto; object-fit: contain; }

        .sedo-logo {
            display: flex;
            flex-direction: column;
            border-left: 2px solid var(--primary-orange);
            padding-left: 12px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary-orange);
            letter-spacing: 4px;
            line-height: 1;
        }

        .logo-tagline {
            font-size: 0.55rem;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        /* Main Form Container */
        .main-wrapper {
            width: 90%;
            max-width: 500px; /* Slimmer for just the form */
            margin: auto; /* Centers vertically and horizontally */
            padding: 40px 0;
        }

        .form-card {
            background: var(--card-bg);
            padding: 35px;
            border-radius: 25px;
            border: 1px solid rgba(255, 145, 0, 0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }

        h2 {
            color: var(--primary-orange);
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 2px;
        }

        /* Input Styling */
        .input-row {
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s ease;
        }

        .input-row:focus-within {
            border-color: var(--primary-orange);
            background: var(--glow-orange);
        }

        .input-row i {
            color: var(--primary-orange);
            width: 30px;
            text-align: center;
        }

        .input-row input, .input-row select {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            font-size: 1rem;
        }

        /* Fix for Dropdown Options visibility */
        select option {
            background-color: #1a1a1a;
            color: white;
        }

        .big-submit {
            width: 100%;
            padding: 20px;
            background: var(--primary-orange);
            color: #000;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .big-submit:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 145, 0, 0.3);
        }

        footer {
            padding: 30px;
            color: #555;
            font-size: 0.75rem;
            text-align: center;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .logo-text { font-size: 1.2rem; }
            .form-card { padding: 25px 20px; }
            .main-wrapper { width: 95%; }
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="orb"></div>
    </div>

    <nav>
        <div class="logo-container">
            <img src="Sedologo.png" alt="SEDO LOGO">
        </div>
        <div class="sedo-logo">
            <span class="logo-text">SEDO</span>
            <span class="logo-tagline">Srilanka</span>
        </div>
    </nav>

    <div class="main-wrapper">
        
        <div class="form-card">
            <h2><i class="fa-solid fa-file-signature"></i> Registration</h2>
            
            <form action="https://formspree.io/f/mrergggw" method="POST">
                
                <div class="input-row">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>
                
                <div class="input-row">
                    <i class="fa-solid fa-map-marker-alt"></i>
                    <input type="text" name="address" placeholder="Address" required>
                </div>
                
                <div class="input-row">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" name="phone" placeholder="Contact no">
                </div>
                
                <div class="input-row">
                    <i class="fa-brands fa-whatsapp"></i>
                    <input type="text" name="whatsapp" placeholder="WhatsApp no">
                </div>
                
                <div class="input-row">
                    <i class="fa-solid fa-location-dot"></i>
                    <select name="location" required>
                        <option value="" disabled selected>Select GN Division</option>
                        <option value="Periyakudiruppu">Periyakudiruppu</option>
                        <option value="Puthukudiruppu">Puthukudiruppu</option>
                        <option value="Aanwasal">Aanwasal</option>
                        <option value="Mandalakuda">Mandalakuda</option>
                        <option value="Sinnakudiruppu">Sinnakudiruppu</option>
                        <option value="Manalthottam">Vanimundhal</option>
                    </select>
                </div>
                
                <button type="submit" class="big-submit">SUBMIT TO SEDO</button>
            </form>
        </div>

    </div>

    <footer>
        &copy; 2026 SEDO | Sri Lanka
    </footer>

</body>
</html>
